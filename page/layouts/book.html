---
layout: page
# The Book collection page
---

<div id="book" class="pl-xl-3">
{% assign book = site.book | where_exp: "item", "item.hidden != true" %}
{% for page in book %}
  <li class="d-flex justify-content-between pl-md-3 pr-md-3">
    <a href="{{ page.url | relative_url }}">Rozdział {{ page.order }}: {{ page.title }}</a>
    <span class="dash flex-grow-1"></span>
  </li>
{% endfor %}

</div>
