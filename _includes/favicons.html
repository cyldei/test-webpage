{% capture favicon_path %}{{ '/assets/img/favicons' | relative_url }}{% endcapture %}
{% assign favicon_ver = site.time | date: '%s' %}

<!-- Use a single custom favicon source and cache-bust it to avoid stale browser icon cache. -->
<link rel="icon" type="image/x-icon" href="{{ favicon_path }}/favicon.ico?v={{ favicon_ver }}">
<link rel="shortcut icon" href="{{ favicon_path }}/favicon.ico?v={{ favicon_ver }}">
<meta name="apple-mobile-web-app-title" content="{{ site.data.locales[site.lang].page.title }}">
<meta name="application-name" content="{{ site.data.locales[site.lang].page.title }}">
<meta name="msapplication-TileColor" content="#da532c">
<meta name="theme-color" content="#ffffff">
