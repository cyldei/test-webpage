# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Change the following value to '/PROJECT_NAME' ONLY IF your site type is GitHub Pages Project sites
# and doesn't have a custom domain.
baseurl: '/test-webpage'

url: 'https://cyldei.github.io'


# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
# If it has the same name as one of the files in folder `_data/locales`, the layout language will also be changed,
# otherwise, the layout language will use the default value of 'en'.
lang: pl

# Change to your timezone › http://www.timezoneconverter.com/cgi-bin/findzone/findzone
timezone: Europe/Warsaw

# jekyll-seo-tag settings › https:x//github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

# google_site_verification:               # fill in to your verification string
# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# google_analytics:
#   id: UA-21626700-1
  # Google Analytics pageviews report settings
  # pv:
  #   proxy_endpoint:   # fill in the Google Analytics superProxy endpoint of Google App Engine
  #   cache_path:       # the local PV cache data, friendly to visitors from GFW region

# Prefer color scheme setting.
#
# Note: Keep empty will follow the system prefer color by default,
# and there will be a toggle to switch the theme between dark and light
# on the bottom left of the sidebar.
#
# Available options:
#
#     light  - Use the light color scheme
#     dark   - Use the dark color scheme
#
theme_mode:   # [light|dark]

# The CDN endpoint for images.
# Notice that once it is assigned, the CDN url
# will be added to all image (site avatar & posts' images) paths starting with '/'
#
# e.g. 'https://cdn.com'
img_cdn:

# the avatar on sidebar, support local or CORS resources
avatar: '/assets/img/author.png'
# avatar image fit mode for sidebar frame: cover | contain | scale-down
avatar_fit: cover
avatar_redirect: '/about'
bar_image:
  # Controls the home-page top image:
  #   disabled - hide the image everywhere (mobile and desktop)
  #   always   - always show the image (default)
  #   desktop  - show on desktop only (hidden on mobile)
  #   mobile   - show on mobile only (hidden on desktop)
  #   active     - hide the image on load; reveal it by scrolling up to the top
  #   spring     - like `active`, but springs back to hidden once you scroll away
  #                from the top
  #   spring-gap - like `spring`, but leaves a small strip of the image peeking
  #                when hidden
  mode: spring-gap
  # Fade the top/bottom of the image into the page background color (white in light
  # mode, dark in dark mode);  
  # Value is thepercent of the image height the fade covers set per viewport.
  # (0 = off ... 100 = full image ... or more),
  top_gradient:
    mobile: 80
    desktop: 55
  # Fade the bottom of the image into the page background (percent of the image
  # height), set per viewport. 0 = off.
  bottom_gradient:
    mobile: 0
    desktop: 0

  pinned_posts_home:
    new_version:
      # true  -> styled "new" pinned cards; false -> the previous simple version
      enable: false
      # gradient background for the new version (true | false)
      gradient: false
    
  # Make the top image taller on mobile (doubles its height).
  extend_mobile: true
  # bottom_fill: gradient  # gradient | solid | none

  light:
    url: "https://picsum.photos/id/1073/2000/1000"
    # url: "/assets/img/background.png"
    position: "top"
    fit: cover  # image fit mode for topbar image: cover | contain | scale-down
  # dark:
  #   url: "https://picsum.photos/id/1073/2000/1000?grayscale"
  #   position: "top"
  #   fit: cover  # falls back to bar_image.light.fit when unset

comments:
  active:         # The global switch for posts comments, e.g., 'disqus'.  Keep it empty means disable
  # The active options are as follows:
  disqus:
    shortname:    # fill with the Disqus shortname. › https://help.disqus.com/en/articles/1717111-what-s-a-shortname
  # utterances settings › https://utteranc.es/
  utterances:
    repo:         # <gh-username>/<repo>
    issue_term:   # < url | pathname | title | ...>
  # Giscus options › https://giscus.app
  giscus:
    repo:              # <gh-username>/<repo>
    repo_id:
    category:
    category_id:
    mapping:           # optional, default to 'pathname'
    input_position:    # optional, default to 'bottom'
    lang:              # optional, default to the value of `site.lang`
    reactions_enabled: # optional, default to the value of `1`

# Self-hosted static assets, optional › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled:      # boolean, keep empty means false
    # specify the Jekyll environment, empty means both
    # only works if `assets.self_host.enabled` is 'true'
    env:          # [development|production]

pwa:
  enabled: false

paginate: 10

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:   # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order
  poems:
    output: true
    sort_by: date
  books:
    output: true
    sort_by: order

collections_dir: data

defaults:
  - scope:
      path: ''          # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true    # Enable comments in posts.
      toc: true         # Display TOC column in posts.
      # DO NOT modify the following parameter unless you are confident enough
      # to update the code of all other post links in this project.
      permalink: /posts/:year/:month/:day/:slug/

      image: 
        aspect_ratio: 40/28
        object_fit: scale 
      return:
        arrow: posts
        footer: posts
        url: /
      author: 'Michal'
  - scope:
      path: _drafts
    values:
      comments: false
      permalink: /drafts/:slug/
  - scope:
      path: ''
      type: poems
    values:
      layout: poem-page
      comments: false
      toc: false
      permalink: /poems/:title/
      return:
        arrow: poems
        footer: poems
        url: /poems
      author: 'Michal'
  - scope:
      path: data/_books/pies
    values:
      layout: book-page
      comments: false
      toc: false
      permalink: /books/pies/:title/
      return:
        arrow: pies
        footer: books
        url: /books/pies
      book: pies
      author: 'Michal'
      image:
        path:  /assets/img/books/pies/cover.png
        aspect_ratio: 3/4
        object_fit: cover
        max_width: 400px
  - scope:
      path: data/_books/trolinek
    values:
      layout: book-page
      comments: false
      toc: true
      permalink: /books/trolinek/:title/
      return:
        arrow: trolinek
        footer: books
        url: /books/trolinek
      book: trolinek
      author: 'Michal'
      image:
        path:  /assets/img/books/trolinek/cover.png
        aspect_ratio: 3/4
        object_fit: cover
        max_width: 400px
  - scope:
      path: ''
      type: tabs             # see `site.collections`
    values:
      layout: page
      permalink: /:title/
  # - scope:
  #     path: /assets/img/favicons
  #   values:
  #     swcache: true
  # - scope:
  #     path: /assets/js/dist
  #   values:
  #     swcache: true

sass:
  style: compressed
  sass_dir: page/sass

layouts_dir: page/layouts
data_dir: page/data
includes_dir: page/includes

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - '*.gem'
  - '*.gemspec'
  - tools
  - README.md
  - CHANGELOG.md
  - LICENSE
  - gulpfile.js
  - node_modules
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

show_drafts: true
creator:
  name: "@cyldei"
  url: https://github.com/cyldei

enable:
  bar_image: true
  sidebar_icons: true
  sidebar_pins: true
  sidebar_disclaimer: true
